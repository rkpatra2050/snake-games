<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>🐍 Jungle Serpent - Snake Adventure Game</title>
    <base href="/snake-games/"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="theme-color" content="#0a1a05"/>
    <meta name="description" content="Jungle Serpent - An immersive animated snake game set in a dangerous jungle!"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a1a05;
        touch-action: pan-y;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* Loading screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #0a1a05;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #4caf50;
        font-family: 'Exo 2', sans-serif;
        font-size: 20px;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      .loading-snake {
        font-size: 60px;
        animation: loadSnake 1s ease-in-out infinite;
      }
      @keyframes loadSnake {
        0%, 100% { transform: scale(1) rotate(-10deg); }
        50% { transform: scale(1.2) rotate(10deg); }
      }
    </style>
  <link rel="stylesheet" href="styles-WO2BYKGF.css"></head>
  <body>
    <div class="loading-screen" id="loading">
      <div class="loading-snake">🐍</div>
      <p style="margin-top:16px; letter-spacing:3px; color:#a5d6a7;">Loading Jungle...</p>
    </div>
    <app-root></app-root>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const l = document.getElementById('loading');
          if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 500); }
        }, 800);
      });
    </script>
  <script src="main-D5GMXL64.js" type="module"></script></body>
</html>
